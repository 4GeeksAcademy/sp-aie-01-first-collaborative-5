<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo | Maison Atelier</title>
    <meta name="description" content="Explora el catalogo completo de Maison Atelier y agrega productos al carrito.">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://maison-atelier.example/catalogo.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Manrope:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --brand-ink: #111827;
            --brand-sand: #F5EFE5;
            --brand-red: #C2412D;
            --brand-gold: #B48B46;
            --surface-white: #FFFFFF;
            --surface-muted: #F8FAFC;
        }

        body {
            font-family: "Manrope", sans-serif;
        }

        .font-editorial {
            font-family: "Playfair Display", serif;
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "Catalogo Maison Atelier",
      "description": "Listado de productos disponibles en Maison Atelier",
      "inLanguage": "es"
    }
  </script>
</head>

<body class="min-h-screen bg-[var(--surface-white)] text-[var(--brand-ink)]">
    <div
        class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_10%_0%,_#F5EFE5_0%,_transparent_38%),radial-gradient(circle_at_90%_90%,_#F8FAFC_0%,_transparent_45%)]">
    </div>

    <div id="headerMount" data-include="header.html" class="border-b border-[#E5E7EB] bg-white/60">
        <header class="mx-auto max-w-6xl px-4 py-4 text-center text-sm text-slate-500 sm:px-6 lg:px-8">
            Placeholder Header (cargando header.html)
        </header>
    </div>

    <div class="mx-auto flex min-h-[calc(100vh-180px)] max-w-6xl flex-col px-4 py-4 sm:px-6 lg:px-8">
        <main class="flex-1 pb-6">
            <section class="rounded-2xl border border-[#E5E7EB] bg-white p-4 shadow-sm sm:p-6">
                <div class="mb-5 flex flex-wrap items-start justify-between gap-3">
                    <div>
                        <h1 class="font-editorial text-3xl font-bold tracking-tight sm:text-4xl">Catalogo Maison Atelier
                        </h1>
                        <p class="mt-1 text-sm text-slate-600">Misma fuente de datos que usa el carrito. Todo lo que
                            agregues se guarda al instante.</p>
                    </div>
                    <a href="carrito.html"
                        class="inline-flex items-center rounded-lg border border-[#D1D5DB] bg-[var(--brand-sand)] px-3 py-2 text-xs font-semibold text-[var(--brand-ink)] transition hover:border-[var(--brand-gold)]">
                        Ver carrito <span id="badgeItems" class="ml-2 rounded-full bg-white px-2 py-0.5">0</span>
                    </a>
                </div>

                <div id="catalogo" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4" itemscope
                    itemtype="https://schema.org/ItemList"></div>
            </section>
        </main>
    </div>

    <div id="footerMount" data-include="footer.html" class="mt-auto border-t border-[#E5E7EB] bg-white/70">
        <footer class="mx-auto max-w-6xl px-4 py-4 text-center text-sm text-slate-500 sm:px-6 lg:px-8">
            Placeholder Footer (cargando footer.html)
        </footer>
    </div>

    <script src="layout.js" defer></script>
    <script src="productos.js" defer></script>
    <script src="catalogo.js" defer></script>
</body>

</html>
