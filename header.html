<header class="sticky top-0 z-50 border-b border-amber-100 bg-white/90 backdrop-blur" itemscope itemtype="https://schema.org/WPHeader">
  <div class="mx-auto flex w-full max-w-7xl flex-col gap-4 px-4 py-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between gap-3">
      <a href="index.html" class="font-display text-2xl tracking-wide text-slate-900" aria-label="Ir al inicio">
        Maison Atelier
      </a>
      <button class="rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 lg:hidden" aria-label="Abrir menu">
        Menu
      </button>
    </div>
    <div class="grid gap-3 lg:grid-cols-[1fr_auto] lg:items-center">
      <form role="search" action="catalogo.html" method="get" class="relative" aria-label="Busqueda de productos">
        <label for="search" class="sr-only">Buscar productos</label>
        <input
          id="search"
          name="q"
          type="search"
          placeholder="Buscar en el catalogo..."
          class="w-full rounded-full border border-slate-300 bg-white px-5 py-3 text-sm shadow-sm outline-none transition focus:border-amber-700 focus:ring-2 focus:ring-amber-200"
        />
      </form>
      <nav aria-label="Cuenta y navegacion principal" class="hidden items-center gap-2 lg:flex" itemscope itemtype="https://schema.org/SiteNavigationElement">
        <a href="catalogo.html" class="rounded-full px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-amber-50">Catalogo</a>
        <a href="carrito.html" class="rounded-full px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-amber-50">Carrito</a>
        <a href="checkout.html" class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700">Mi cuenta</a>
      </nav>
    </div>
  </div>
</header>
